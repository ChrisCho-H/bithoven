name: Deploy IDE to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "ide/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-ide-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-ide:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ide/package-lock.json

      - name: Install dependencies
        working-directory: ide
        run: npm ci

      - name: Build IDE
        working-directory: ide
        run: npm run build

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy IDE to GitHub Pages
        working-directory: ide
        run: npm run deploy -- --repo https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
        env:
          GITHUB_TOKEN: ${{ github.token }}
